<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заказы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar { min-width: 250px; max-width: 250px; min-height: 100vh; }
        .order-card { margin-bottom: 15px; }
    </style>
</head>
<body class="bg-light">

<div class="d-flex">
    <!-- Боковое меню -->
    <div class="sidebar d-flex flex-column p-3 text-white bg-dark">
        <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none">
            <span class="fs-4">Меню</span>
        </a>
        <hr>
        <ul class="nav nav-pills flex-column mb-auto">
            <li><a href="/" class="nav-link text-white">Главная</a></li>
            <li><a href="/catalog" class="nav-link text-white">Категории</a></li>
            <li><a href="/orders" class="nav-link active">Заказы</a></li>
            <li><a href="/contacts" class="nav-link text-white">Контакты</a></li>
        </ul>
        <hr>
        <div class="dropdown p-2 text-secondary">
            <small class="d-block">Профиль</small>
            <small class="d-block mb-2">Выход</small>
            <strong class="text-white">Пользователь</strong>
        </div>
    </div>

    <!-- Контент страницы заказов -->
    <div class="container-fluid p-5">
        <h1 class="text-center mb-5">Мои заказы</h1>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <!-- Заказ 1 -->
                <div class="card order-card shadow-sm">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h5 class="mb-1">Заказ #2304</h5>
                                <p class="mb-1 text-muted small">Дата: 03.05.2026</p>
                                <p class="mb-0 text-muted small">Статус: <span class="text-success">Доставлен</span></p>
                            </div>
                            <div class="text-end">
                                <h5 class="mb-1">$ 350</h5>
                                <button class="btn btn-sm btn-outline-primary">Подробнее</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Заказ 2 -->
                <div class="card order-card shadow-sm">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h5 class="mb-1">Заказ #2303</h5>
                                <p class="mb-1 text-muted small">Дата: 28.04.2026</p>
                                <p class="mb-0 text-muted small">Статус: <span class="text-warning">В пути</span></p>
                            </div>
                            <div class="text-end">
                                <h5 class="mb-1">$ 120</h5>
                                <button class="btn btn-sm btn-outline-primary">Подробнее</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Заказ 3 -->
                <div class="card order-card shadow-sm">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h5 class="mb-1">Заказ #2302</h5>
                                <p class="mb-1 text-muted small">Дата: 15.04.2026</p>
                                <p class="mb-0 text-muted small">Статус: <span class="text-secondary">Отменён</span></p>
                            </div>
                            <div class="text-end">
                                <h5 class="mb-1">$ 75</h5>
                                <button class="btn btn-sm btn-outline-primary">Подробнее</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="pt-5 my-5 text-muted border-top text-center">
            &copy; 2026 Учебный проект
        </footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
